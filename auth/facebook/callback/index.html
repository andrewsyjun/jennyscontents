<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Facebook Login Callback | Jenny's Contents</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #f6f4ef;
        color: #1c2420;
      }

      main {
        width: min(620px, calc(100vw - 32px));
        border: 1px solid #d9d4c8;
        border-radius: 8px;
        background: #fffdf8;
        padding: 24px;
        box-shadow: 0 14px 36px rgb(31 37 35 / 10%);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.4rem;
      }

      p {
        margin: 0;
        color: #66706b;
        line-height: 1.5;
      }

      a {
        color: #245746;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">Completing Facebook Login</h1>
      <p id="message">Saving the review session and returning to Jenny's Contents.</p>
    </main>

    <script>
      const tokenKey = "jennyscontents.facebookReviewToken";
      const hash = new URLSearchParams(window.location.hash.slice(1));
      const search = new URLSearchParams(window.location.search);
      const accessToken = hash.get("access_token");
      const state = hash.get("state") || search.get("state");
      const error = hash.get("error_description") || hash.get("error") || search.get("error_description") || search.get("error");
      const appRoot = "../../../";

      if (error) {
        document.querySelector("#title").textContent = "Facebook Login was not completed";
        document.querySelector("#message").innerHTML =
          `${escapeHtml(error)} <a href="${appRoot}">Return to Jenny's Contents</a>`;
      } else if (!accessToken) {
        document.querySelector("#title").textContent = "No Facebook token returned";
        document.querySelector("#message").innerHTML =
          `The review callback loaded, but Facebook did not return an access token. <a href="${appRoot}">Return to Jenny's Contents</a>`;
      } else if (state !== "jennyscontents-github-review") {
        document.querySelector("#title").textContent = "State check failed";
        document.querySelector("#message").innerHTML =
          `The callback state did not match the expected review session. <a href="${appRoot}">Return to Jenny's Contents</a>`;
      } else {
        sessionStorage.setItem(tokenKey, accessToken);
        window.location.replace(`${appRoot}?review_login=success`);
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (character) => {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };
          return map[character];
        });
      }
    </script>
  </body>
</html>
